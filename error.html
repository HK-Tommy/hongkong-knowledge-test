<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統維護中 | 香港你識幾多 ?</title>
    <link rel="icon" href="assets/web_icon.jpeg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .hk-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="hk-gradient min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-10 text-center shadow-2xl animate__animated animate__fadeIn">
        <div class="relative w-24 h-24 mx-auto mb-8">
            <div class="absolute inset-0 bg-blue-100 rounded-3xl rotate-12 animate-pulse"></div>
            <div class="absolute inset-0 bg-white rounded-3xl shadow-sm flex items-center justify-center">
                <i class="fas fa-screwdriver-wrench text-4xl text-blue-600 animate__animated animate__swing animate__infinite animate__slower"></i>
            </div>
        </div>

        <h1 id="title" class="text-3xl font-black mb-4">系統維護中</h1>
        
        <div class="space-y-4 text-slate-600 leading-relaxed mb-8">
            <p id="description">唔好意思，我哋正喺度進行系統升級同埋注入緊更多有趣嘅題目。</p>
            <p id="exp.time" class="text-sm bg-blue-50 py-2 px-4 rounded-full text-red-600 font-bold inline-block">
                預計完成時間：--
            </p>
            <p id="update.time" class="text-sm bg-blue-50 py-2 px-4 rounded-full text-blue-700 font-bold inline-block">
                最後更新時間：--
            </p>
        </div>

        <div class="border-t border-slate-100 pt-8">
            <p class="text-xs text-slate-400 mb-6">如有急事，請透過「幫助中心」聯絡湯米團隊</p>
            <div class="flex justify-center gap-4">
                <a href="help.html?ref=error" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">
                    聯絡我們
                </a>
                <button onclick="location.reload()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition">
                    重新整理
                </button>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-slate-300 uppercase tracking-widest font-bold">
            &copy; 2026 Tommy & Team. All Rights Reserved.
        </p>
    </div>


<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDBlLKubxwPc2Tsd11Bb-3wLC_GWbhKnJY",
        authDomain: "hongkong-knowledge-test.firebaseapp.com",
        projectId: "hongkong-knowledge-test",
        storageBucket: "hongkong-knowledge-test.firebasestorage.app",
        messagingSenderId: "313639841915",
        appId: "1:313639841915:web:3bf72e64fe87d00708b2de",
        measurementId: "G-XBQYR496DQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();


    function CheckServerStatus() {
        const statusRef = doc(db, "Status", "Server");
        getDoc(statusRef).then((docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.State === false) {
                    document.getElementById("title").textContent = data.Title || "系統維護中";
                    document.getElementById("description").textContent = data.Description || "唔好意思，我哋正喺度進行系統升級同埋注入緊更多有趣嘅題目。";

                    if (data.Maintenance === true){
                        let date = data.ExpectedTime.toDate();
                        let y = date.getFullYear();
                        let m = date.getMonth() + 1;
                        let d = date.getDate();
                        let hr = String(date.getHours()).padStart(2, '0');
                        let min = String(date.getMinutes()).padStart(2, '0');

                        let customTime = `${y}年${m}月${d}日 ${hr}:${min}`;
                        document.getElementById("exp.time").textContent = "預計完成時間：" + customTime;

                    } else {
                        document.getElementById("exp.time").hidden = true;
                    }
                    
                    let date = data.Lastupdate.toDate();
                    let y = date.getFullYear();
                    let m = date.getMonth() + 1;
                    let d = date.getDate();
                    let hr = String(date.getHours()).padStart(2, '0');
                    let min = String(date.getMinutes()).padStart(2, '0');

                    let customTime = `${y}年${m}月${d}日 ${hr}:${min}`;
                    document.getElementById("update.time").textContent = "最後更新時間：" + customTime;


                } else {
                    console.log("No such document!");
                    window.location.replace("index.html");
                }


            } else {
                console.log("No such document!");
                window.location.replace("index.html");
            }
        }).catch((error) => {
            console.log("Error getting document:", error);
            window.location.replace("index.html");
        });
    }

    CheckServerStatus();
</script>
</body>
</html>
