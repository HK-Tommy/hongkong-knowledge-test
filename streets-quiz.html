<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港街道名篇 | 香港你識幾多 ?</title>
    <link rel="icon" href="assets/web_icon.jpeg" type="image/x-icon">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">
    <div id="quiz-card" class="bg-white text-gray-800 w-full max-w-2xl rounded-3xl p-8 shadow-2xl animate__animated animate__zoomIn">
        <div class="flex justify-start mb-4">
            <button id="back-home-btn" class="flex items-center gap-2 text-slate-500 hover:text-blue-600 transition font-bold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                返回主頁
            </button>
        </div>
        
        <div class="w-full bg-gray-200 rounded-full h-2 mb-8">
            <div id="progress" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div id="question-area">
            <div class="flex items-center gap-4 mb-6">
                <p id="q-level" class="text-red-500 font-bold mb-2">基礎</p>
                <p id="q-count" class="text-blue-500 font-bold mb-2">問題 1 / 100</p> 
                <div style="float: right; margin-left: auto;">
                    <p id="q-time" class="text-black-500 font-bold mb-2">⏱30:00</p>
                </div>
                
            </div>
            <h2 id="q-text" class="text-2xl font-bold mb-8 leading-tight">正在載入問題...</h2>
            <div id="options" class="grid gap-4"></div>
            
            <div id="explanation-box" class="hidden mt-8 p-6 bg-slate-50 border-l-4 border-blue-500 rounded-2xl animate__animated animate__fadeIn">
                <p id="feedback-text" class="font-black text-lg mb-2"></p>
                <p id="exp-text" class="text-slate-600 leading-relaxed"></p>
                <button id="next-btn" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">下一題</button>
            </div>
        </div>

        <div id="result-area" class="hidden text-center py-10">
            <div class="text-6xl mb-4">香港街道名篇</div>
            <h2 class="text-3xl font-black mb-2 text-slate-800">🏆挑戰完成！</h2>
            <p class="text-slate-400 mb-6">您的最終得分為：</p>
            <p class="text-8xl font-black text-blue-600 mb-10" id="final-score">0</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="location.reload()" class="bg-slate-100 py-4 rounded-2xl font-bold text-slate-600 hover:bg-slate-200 transition">重新挑戰</button>
                <button id="upload-score-btn" class="bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-xl">儲存分數</button>
            </div>

            <button id="share-score-btn" class="mt-4 w-full bg-green-500 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-green-600 transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                </svg>
                分享我的戰績
            </button>

            <button onclick="location.href='index.html'" class="mt-6 text-slate-400 font-bold hover:text-blue-600 transition">回首頁</button>
        </div>
        
    </div>

    <script type="module">
        import { streetsQuestions } from './js/questions.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection,doc, getDoc, setDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDBlLKubxwPc2Tsd11Bb-3wLC_GWbhKnJY",
            authDomain: "hongkong-knowledge-test.firebaseapp.com",
            projectId: "hongkong-knowledge-test",
            storageBucket: "hongkong-knowledge-test.firebasestorage.app",
            messagingSenderId: "313639841915",
            appId: "1:313639841915:web:3bf72e64fe87d00708b2de",
            measurementId: "G-XBQYR496DQ"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();
        let currentIdx = 0;
        let score = 0;
        let timerInterval;
        let totaltime = 30 * 60; 
        let timeLeft = 30 * 60;


        // --- 計時器邏輯 ---
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('q-time').innerText = `⏱${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (timeLeft <= 0) { 
                    clearInterval(timerInterval);
                    alert("時間到！系統將自動提交。");
                    showResults();
                } else if (timeLeft === 30) {
                    // 時間剩30秒時閃爍提示
                    document.getElementById('q-time').classList.add('animate__animated', 'animate__flash', 'animate__infinite');
                    document.getElementById('q-time').style.color = '#e53e3e'; 
                }
            }, 1000);
        }

        startTimer();


        document.getElementById('back-home-btn').onclick = () => {
            if (confirm("確定要中斷挑戰並返回主頁嗎？目前的進度將不會被儲存。")) {
                // 清除計時器防止內存洩漏
                clearInterval(timerInterval);
                location.href = 'index.html';
            }
        };

        function renderQuestion() {
            const q = streetsQuestions[currentIdx];
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('q-count').innerText = `問題 ${currentIdx + 1} / ${streetsQuestions.length}`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('progress').style.width = `${(currentIdx / streetsQuestions.length) * 100}%`;
            
            if (q.pts === 1) {
                document.getElementById('q-level').innerText = "基礎";
            } else if (q.pts === 5) {
                document.getElementById('q-level').innerText = "進階";
            } else if (q.pts === 10) {
                document.getElementById('q-level').innerText = "挑戰";
            }else if (q.pts === 20) {
                document.getElementById('q-level').innerText = "地獄級";
            }

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 border-2 border-slate-100 rounded-2xl hover:border-blue-500 hover:bg-blue-50 transition-all font-bold animate__animated animate__fadeInUp";
                btn.style.animationDelay = `${i * 0.1}s`;
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i, btn);
                optionsDiv.appendChild(btn);
            });
        }

        function handleAnswer(choice, clickedBtn) {
            const q = streetsQuestions[currentIdx];
            const allBtns = document.getElementById('options').querySelectorAll('button');
            
            // 禁用按鈕
            allBtns.forEach(b => b.onclick = null);

            if (choice === q.a) {
                score += q.pts;
                clickedBtn.classList.replace('border-slate-100', 'border-green-500');
                clickedBtn.classList.add('bg-green-50', 'text-green-700');
                document.getElementById('feedback-text').innerText = "✅ 回答正確！";
                document.getElementById('feedback-text').className = "text-green-600 font-black text-xl mb-2";
            } else {
                clickedBtn.classList.replace('border-slate-100', 'border-red-500');
                clickedBtn.classList.add('bg-red-50', 'text-red-700');
                allBtns[q.a].classList.replace('border-slate-100', 'border-green-500');
                allBtns[q.a].classList.add('bg-green-50');
                document.getElementById('feedback-text').innerText = "❌ 答錯囉！";
                document.getElementById('feedback-text').className = "text-red-600 font-black text-xl mb-2";
            }

            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('explanation-box').classList.remove('hidden');
            
            document.getElementById('next-btn').onclick = () => {
                if (currentIdx < streetsQuestions.length - 1) {
                    currentIdx++;
                    renderQuestion();
                } else {
                    showResults();
                }
            };
        }

        function animateScore(target) {
            let current = 0;
            const duration = 1000;
            const step = target / (duration / 16);
            const counter = setInterval(() => {
                current += step;
                if (current >= target) {
                    document.getElementById('final-score').innerText = target;
                    clearInterval(counter);
                } else {
                    document.getElementById('final-score').innerText = Math.floor(current);
                }
            }, 16);
        }

        function showResults() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('progress').style.width = "100%";
            animateScore(score);
        }

        
document.getElementById('upload-score-btn').onclick = async () => {
    // 1. 判斷用戶是否登入
    if (!auth.currentUser) {
        alert('⚠️ 請先登入 Google 帳號，才能將分數紀錄在排行榜上！');
        // 選項：可以加一行 location.href = 'index.html'; 強制回首頁登入
        return;
    }

    // 防止用戶連續點擊導致多次觸發
    const btn = document.getElementById('upload-score-btn');
    btn.disabled = true;
    btn.innerText = "正在上傳...";

    const userUid = auth.currentUser.uid;
    const leaderboardRef = doc(db, "leaderboard", userUid);


    // 【新路徑】：leaderboard -> streets -> users -> UID
    const userScoreRef = doc(db, "leaderboard", "Streets", "users", userUid);
    
    try {
        const docSnap = await getDoc(userScoreRef);
        let shouldUpdate = true;
        let oldScore = 0;

        if (docSnap.exists()) {
            oldScore = docSnap.data().score || 0;
            if (score <= oldScore) shouldUpdate = false;
            }

        if (shouldUpdate) {
            const remain_mins = Math.floor((totaltime - timeLeft) / 60);
            const remain_secs = (totaltime - timeLeft) % 60;
            const timeSpent = `⏱${remain_mins}:${remain_secs < 10 ? '0' : ''}${remain_secs}`;

            await setDoc(userScoreRef, {
                uid: userUid,
                name: auth.currentUser.displayName,
                photoURL: auth.currentUser.photoURL,
                score: score, // 儲存分數
                attempts: increment(1), // 自動增加嘗試次數
                lastUpdated: serverTimestamp(),
                timeSpent: timeSpent
            }, { merge: true });
            alert(`🎉 新紀錄：${score} 分！`);
        } else {
            // 即使沒破紀錄，我們也可以只增加次數
            await setDoc(userScoreRef, { attempts: increment(1) }, { merge: true });
            alert(`挑戰完成！本次得分：${score}`);
        }
        async function nativeShare(score, category) {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '香港知識大挑戰',
                        text: `我在「香港知識大挑戰」的${category}篇拿到了 ${score} 分！你也來試試吧！🔥`,
                        url: window.location.origin // 你的網址
                    });
                    console.log('分享成功');
                } catch (err) {
                    console.log('取消分享或失敗: ', err);
                }
            } else {
                // 如果瀏覽器不支援 Web Share (如 PC 端)，就顯示上面寫的自定義 Modal
                showShareUI(score, category);
            }
}
        location.href = 'index.html';
    } catch (e) {
        console.error("儲存失敗：", e);
    }
};

renderQuestion();

// --- 新增：分享功能函數 ---
    const handleShare = async () => {
    const shareData = {
        title: '香港你識幾多 ?',
        text: `我啱啱完成咗「香港街道名篇」挑戰！攞咗 ${score} 分！你都嚟試吓你自己嘅實力啦！🔥 `,
        url: "https://hk-tommy.github.io/hongkong-knowledge-test/" // 或者填寫您的網站網址
    };

    try {
        if (navigator.share) {
            // 使用移動端原生的分享選單 (WhatsApp, IG, FB 等)
            await navigator.share(shareData);
        } else {
            // 如果是 PC 瀏覽器不支援 Web Share API，則改為複製到剪貼簿
            await navigator.clipboard.writeText(`${shareData.text} \n連結：${shareData.url}`);
            alert('分享連結已複製到剪貼簿！您可以直接貼給朋友。');
        }
    } catch (err) {
        console.error('分享失敗:', err);
    }
};
    </script>
</body>
</html>
