<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全港排名榜 - 香港你識幾多 ?</title>
    <link rel="icon" href="assets/web_icon.jpeg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .rank-1 { background: linear-gradient(135deg, #fef3c7 0%, #fbbf24 100%); border: 2px solid #f59e0b; }
        .rank-2 { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); border: 2px solid #94a3b8; }
        .rank-3 { background: linear-gradient(135deg, #ffedd5 0%, #fdba74 100%); border: 2px solid #f97316; }
        .tab-active { @apply bg-blue-600 text-white shadow-lg; }
    </style>
</head>
<body class="pb-20">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 py-4 shadow-sm flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2">
            <span class="text-2xl">🏆</span>
            <h1 class="text-xl font-black text-blue-700">全港排名榜</h1>
        </a>
        <a href="index.html" class="text-slate-500 hover:text-blue-600 font-bold transition">返回</a>
    </nav>
    
    
    <main class="max-w-3xl mx-auto px-6 pt-10">
        <div class="relative mb-6 animate__animated animate__fadeIn">
            <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="leaderboard-search" placeholder="搜尋玩家名稱..." class="w-full pl-11 pr-4 py-3 rounded-2xl bg-white border border-slate-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        </div>

        <div id="scroll-hint-text" ...>
        <div id="scroll-hint-text" class="flex items-center justify-between mb-3 px-1 transition-opacity duration-500">
            <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">排行榜類別</span>
            <div class="flex items-center gap-1.5 text-amber-500 bg-amber-50 px-2.5 py-1 rounded-full border border-amber-100">
                <span class="text-[10px] font-bold italic">向右滾動查看更多</span>
                <i class="fas fa-arrow-right-long text-[10px] animate-pulse"></i>
            </div>
        </div>
        <div class="flex p-1 bg-slate-200 rounded-2xl mb-8 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('History')" id="tab-History" class="flex-1 py-3 px-4 rounded-xl font-black transition tab-active whitespace-nowrap">
                <i class="fas fa-monument mr-2"></i>歷史篇
            </button>
            <button onclick="switchTab('Geography')" id="tab-Geography" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-map-marked-alt mr-2"></i>地理篇
            </button>
            <button onclick="switchTab('Trends')" id="tab-Trends" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-bolt mr-2"></i>流行文化篇
            </button>
            <button onclick="switchTab('Cantonese')" id="tab-Cantonese" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-comments mr-2"></i>廣東話篇
            </button>   
            <button onclick="switchTab('Streets')" id="tab-Streets" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-road mr-2"></i>街道篇
            </button>
            <button onclick="switchTab('TeaRestaurantSlang')" id="tab-TeaRestaurantSlang" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-coffee mr-2"></i>茶餐廳術語篇
            </button>
            <button onclick="switchTab('IntangibleCulturalHeritage')" id="tab-IntangibleCulturalHeritage" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-dragon mr-2"></i>非物質文化遺產篇
            </button>
            <button onclick="switchTab('Art')" id="tab-Art" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-palette mr-2"></i>藝術篇
            </button>
            <button onclick="switchTab('Brand')" id="tab-Brand" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-tags mr-2"></i>品牌篇
            </button>
            <button onclick="switchTab('TraditionalCustoms')" id="tab-TraditionalCustoms" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-vihara mr-2"></i>香港傳統習俗篇
            </button>
            <button onclick="switchTab('Transport')" id="tab-Transport" class="flex-1 py-3 px-4 rounded-xl font-black text-slate-500 transition whitespace-nowrap">
                <i class="fas fa-bus mr-2"></i>交通篇
            </button>
        </div>
        
        </div>  

        <div id="leaderboard-content" class="space-y-4 animate__animated animate__fadeIn">
            <div class="flex justify-center py-20 text-slate-400">
                <i class="fas fa-spinner fa-spin text-3xl"></i>
            </div>
        </div>
        </div>
        <div id="no-player-message" class="hidden text-center py-20 animate__animated animate__fadeIn">
        <div class="text-5xl mb-4">🔍</div>
        <h3 class="text-xl font-black text-slate-700">搵唔到呢位玩家添</h3>
        <p class="text-slate-400 mt-2">請檢查名稱是否輸入正確，或者佢仲未挑戰呢個類別。</p>

    </main>

    <div id="my-rank-footer" class="fixed bottom-0 left-0 right-0 bg-blue-700 text-white p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] transform translate-y-full transition-transform duration-500">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span id="my-rank-num" class="text-2xl font-black italic">#--</span>
                <div>
                    <p class="text-xs opacity-70">你的目前排名</p>
                    <p id="my-name" class="font-bold">未登入</p>
                </div>
            </div>
            <div class="text-right">
                <p id="my-score" class="text-2xl font-black">-- 分</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBlLKubxwPc2Tsd11Bb-3wLC_GWbhKnJY",
            authDomain: "hongkong-knowledge-test.firebaseapp.com",
            projectId: "hongkong-knowledge-test",
            storageBucket: "hongkong-knowledge-test.firebasestorage.app",
            messagingSenderId: "313639841915",
            appId: "1:313639841915:web:3bf72e64fe87d00708b2de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth();

        let currentCategory = 'History';

        // 切換標籤功能
        window.switchTab = (category) => {
            currentCategory = category;
            document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
                btn.classList.remove('tab-active', 'text-white');
                btn.classList.add('text-slate-500');
            });
            document.getElementById(`tab-${category}`).classList.add('tab-active');
            document.getElementById(`tab-${category}`).classList.remove('text-slate-500');
            loadLeaderboard(category);
        };

        // 加載數據
        async function loadLeaderboard(category) {
            const container = document.getElementById('leaderboard-content');
            container.innerHTML = `<div class="flex justify-center py-20 text-slate-400"><i class="fas fa-spinner fa-spin text-3xl"></i></div>`;

            try {
                const q = query(
                    collection(db, "leaderboard", category, "users"),
                    orderBy("score", "desc"),
                    limit(50)
                );
                
                const querySnapshot = await getDocs(q);
                let html = '';
                let rank = 1;

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const isTop3 = rank <= 3;
                    const rankClass = isTop3 ? `rank-${rank}` : 'bg-white';
                    const LastUpdated = data.lastUpdated ? new Date(data.lastUpdated.seconds * 1000).toLocaleString() : ''; 
                    
                    html += `
                        <div class="flex items-center gap-4 p-5 rounded-[2rem] shadow-sm transition hover:scale-[1.02] ${rankClass} animate__animated animate__fadeInUp" style="animation-delay: ${rank * 0.05}s">
                            <div class="w-10 text-center font-black text-xl ${rank > 3 ? 'text-slate-300' : 'text-slate-900'}">
                                ${rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank}
                            </div>
                            <img src="${data.photoURL || 'assets/default-avatar.png'}" class="w-12 h-12 rounded-full border-2 border-white/50 shadow-sm">
                            <div class="flex-1">
                                <h4 class="font-black text-slate-800">${data.name || '無名英雄'}</h4>
                                <p class="text-xs text-slate-500">${data.attempts || 0} 次嘗試 | ${data.timeSpent || '⏱0:00'}</p>
                                <p class="text-xs text-slate-500">${LastUpdated || ''}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black text-blue-800">${data.score}</span>
                                <span class="text-[10px] font-bold text-blue-400 block uppercase tracking-tighter">Points</span>
                            </div>
                        </div>
                    `;
                    rank++;
                });

                container.innerHTML = html || '<p class="text-center py-10 text-slate-400">目前暫無數據</p>';
                updateMyRank(category, querySnapshot);

            } catch (error) {
                console.error("Error loading leaderboard:", error);
                container.innerHTML = `<p class="text-center text-red-500">數據加載失敗</p>`;
            }
        }

        // 更新底部個人排名
        // 在 <script type="module"> 中找到 updateMyRank 並微調
function updateMyRank(category, snapshot) {
    const footer = document.getElementById('my-rank-footer');
    onAuthStateChanged(auth, (user) => {
        if (user) {
            footer.classList.remove('translate-y-full');
            document.getElementById('my-name').innerText = user.displayName;
            
            let myIndex = -1;
            let myData = null;
            
            snapshot.docs.forEach((doc, index) => {
                if (doc.id === user.uid) {
                    myIndex = index + 1;
                    myData = doc.data();
                }
            });

            if (myIndex !== -1) {
                document.getElementById('my-rank-num').innerText = `#${myIndex}`;
                document.getElementById('my-score').innerText = `${myData.score} 分`;
            } else {
                // 如果在 Top 50 找不到，顯示 50+ 或未挑戰
                document.getElementById('my-rank-num').innerText = "--";
                document.getElementById('my-score').innerText = "未有紀錄";
            }
        } else {
            footer.classList.add('translate-y-full');
        }
    });
}

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('category') || 'History';
    loadLeaderboard(category);


    // ==========================================
// 新增：排行榜搜尋過濾功能
// ==========================================
const searchInput = document.getElementById('leaderboard-search');
const noPlayerMessage = document.getElementById('no-player-message');

function filterLeaderboard() {
    const query = searchInput.value.toLowerCase().trim();
    // 取得所有排名卡片（排除掉那些 loading 狀態或非卡片的元素）
    const cards = document.querySelectorAll('#leaderboard-content > div[class*="flex"]');
    let visibleCount = 0;

    cards.forEach(card => {
        // 取得玩家名稱 (h4)
        const nameElement = card.querySelector('h4');
        const name = nameElement ? nameElement.innerText.toLowerCase() : '';

        if (name.includes(query)) {
            card.style.display = 'flex';
            visibleCount++;
        } else {
            card.style.display = 'none';
        }
    });

    // 處理空狀態提示
    if (visibleCount === 0 && cards.length > 0) {
        noPlayerMessage.classList.remove('hidden');
    } else {
        noPlayerMessage.classList.add('hidden');
    }
}

// 監聽搜尋輸入
if(searchInput) {
    searchInput.addEventListener('input', filterLeaderboard);
}

// 修改原有的 loadLeaderboard 函數：確保切換標籤時清空搜尋框
const originalSwitchTab = window.switchTab;
window.switchTab = (category) => {
    if(searchInput) searchInput.value = ''; // 切換類別時清空搜尋
    if(noPlayerMessage) noPlayerMessage.classList.add('hidden');
    originalSwitchTab(category);
};

    </script>
</body>
</html>
