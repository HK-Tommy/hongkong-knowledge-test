<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龍虎榜 | 香港你認識幾多</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .rank-1 { background: linear-gradient(135deg, #fde047 0%, #eab308 100%); }
        .rank-2 { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%); }
        .rank-3 { background: linear-gradient(135deg, #ffedd5 0%, #d97706 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 font-black text-2xl text-blue-600">
                <i class="fa-solid fa-chevron-left text-sm"></i> 香港你認識幾多
            </a>
            <h1 class="font-black text-xl text-slate-800">全港龍虎榜</h1>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        
        <div class="flex bg-slate-200 p-1 rounded-2xl mb-8">
            <button id="tab-history" onclick="switchCategory('History')" class="flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-blue-600">
                <i class="fa-solid fa-book-open mr-2"></i>歷史篇
            </button>
            <button id="tab-geography" onclick="switchCategory('Geography')" class="flex-1 py-3 rounded-xl font-bold transition-all text-slate-500 hover:text-slate-700">
                <i class="fa-solid fa-earth-asia mr-2"></i>地理篇
            </button>
        </div>

        <div id="leaderboard-list" class="space-y-4 animate__animated animate__fadeIn">
            <div class="text-center py-20 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i>
                <p>正在收集高手數據...</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDBlLKubxwPc2Tsd11Bb-3wLC_GWbhKnJY",
            authDomain: "hongkong-knowledge-test.firebaseapp.com",
            projectId: "hongkong-knowledge-test",
            storageBucket: "hongkong-knowledge-test.firebasestorage.app",
            messagingSenderId: "313639841915",
            appId: "1:313639841915:web:3bf72e64fe87d00708b2de",
            measurementId: "G-XBQYR496DQ"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "default");

        let currentCategory = 'History';

        async function fetchLeaderboard(category) {
            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = `<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"></i></div>`;

            try {
                const q = query(
                    collection(db, "leaderboard"),
                    where("category", "==", category),
                    orderBy("score", "desc"),
                    limit(20)
                );

                const querySnapshot = await getDocs(q);
                listDiv.innerHTML = '';

                if (querySnapshot.empty) {
                    listDiv.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold">目前尚無紀錄，快去挑戰吧！</div>`;
                    return;
                }

                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = createLeaderboardItem(rank, data);
                    listDiv.appendChild(item);
                    rank++;
                });
            } catch (e) {
                console.error("Error fetching leaderboard: ", e);
                listDiv.innerHTML = `<div class="text-center py-20 text-red-400 font-bold">讀取失敗，請檢查資料庫索引設置。</div>`;
            }
        }

        function createLeaderboardItem(rank, data) {
            const div = document.createElement('div');
            div.className = `glass-card flex items-center p-4 rounded-2xl shadow-sm border border-slate-100 animate__animated animate__fadeInUp`;
            div.style.animationDelay = `${rank * 0.05}s`;

            // 獎牌顏色邏輯
            let rankBadge = `<span class="w-8 text-center font-black text-slate-400">${rank}</span>`;
            if (rank === 1) rankBadge = `<span class="rank-1 w-10 h-10 flex items-center justify-center rounded-full text-white shadow-lg"><i class="fa-solid fa-crown"></i></span>`;
            if (rank === 2) rankBadge = `<span class="rank-2 w-10 h-10 flex items-center justify-center rounded-full text-white shadow-lg">2</span>`;
            if (rank === 3) rankBadge = `<span class="rank-3 w-10 h-10 flex items-center justify-center rounded-full text-white shadow-lg">3</span>`;

            div.innerHTML = `
                <div class="flex items-center gap-4 flex-1">
                    <div class="w-10 flex justify-center">${rankBadge}</div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm">
                            <img src="${data.photoURL || 'https://ui-avatars.com/api/?name='+data.name}" alt="avatar">
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">${data.name || '匿名玩家'}</p>
                            <p class="text-xs text-slate-400">${new Date(data.time?.toDate()).toLocaleDateString()}</p>
                        </div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-2xl font-black text-blue-600">${data.score}</span>
                    <span class="text-xs font-bold text-slate-400 ml-1">分</span>
                </div>
            `;
            return div;
        }

        window.switchCategory = (cat) => {
            currentCategory = cat;
            // UI 切換
            const isHistory = cat === 'History';
            document.getElementById('tab-history').className = isHistory 
                ? "flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-blue-600" 
                : "flex-1 py-3 rounded-xl font-bold transition-all text-slate-500 hover:text-slate-700";
            
            document.getElementById('tab-geography').className = !isHistory 
                ? "flex-1 py-3 rounded-xl font-bold transition-all bg-white shadow-sm text-emerald-600" 
                : "flex-1 py-3 rounded-xl font-bold transition-all text-slate-500 hover:text-slate-700";

            fetchLeaderboard(cat);
        };

        // 初次加載
        fetchLeaderboard('History');
    </script>
</body>
</html>
